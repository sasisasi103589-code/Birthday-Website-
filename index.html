<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="loading">
    <h1>Loading Your Surprise...</h1>
</div>

<div id="main" class="hidden">

    <!-- Floating Hearts -->
    <div class="hearts"></div>

    <!-- Hero -->
    <section class="hero">

        <img src="images/photo1.jpg" class="profile">

        <h1>Happy Birthday ❤️</h1>

        <h2>My Dear Love</h2>

        <button id="startBtn">
            Open Surprise 🎁
        </button>

    </section>

    <!-- Letter -->
    <section id="letter" class="hidden">

        <h2>💌 A Letter For You</h2>

        <p id="typingText"></p>

        <button id="nextBtn">
            Next ➜
        </button>

    </section>

    <!-- Gallery -->
    <section id="gallery" class="hidden">

        <h2>Our Memories ❤️</h2>

        <div class="gallery">

            <img src="images/photo1.jpg">

            <img src="images/photo2.jpg">

            <img src="images/photo3.jpg">

            <img src="images/photo4.jpg">

        </div>

        <button id="finalBtn">
            Final Surprise 🎉
        </button>

    </section>

    <!-- Final -->
    <section id="final" class="hidden">

        <h1>I Love You Forever ❤️</h1>

        <p>
            Thank you for coming into my life.
            You are my happiness, my smile,
            my everything.
        </p>

        <canvas id="confetti"></canvas>

    </section>

</div>

<audio id="bgMusic" loop>
    <source src="music/song.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
